<style>
/* ============ Raus · Tracker v2 — design system ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f5f3; --bg-grad-a:rgba(16,185,129,.07); --bg-grad-b:rgba(249,115,22,.05);
  --surface:#ffffff; --surface-2:#f1efec; --surface-3:#e9e7e3;
  --border:#e8e5e1; --border-2:#dcd8d3;
  --ink:#1c1917; --ink-2:#57534e; --ink-3:#a8a29e; --ink-4:#d6d2cc;
  --accent:#059669; --accent-2:#10b981; --accent-soft:#ecfdf5; --accent-border:#a7f3d0;
  --red:#dc2626; --red-soft:#fef2f2; --red-border:#fecaca; --red-ink:#991b1b;
  --amber:#d97706; --amber-soft:#fffbeb; --amber-border:#fde68a; --amber-ink:#92400e;
  --sky-ink:#0369a1; --sky-soft:#f0f9ff; --sky-border:#bae6fd;
  --lp:#c026d3;
  --shadow-1:0 1px 2px rgba(28,25,23,.05),0 10px 24px -18px rgba(28,25,23,.25);
  --shadow-2:0 2px 6px rgba(28,25,23,.10),0 18px 36px -18px rgba(28,25,23,.35);
  --r-lg:18px; --r-md:14px; --r-sm:10px;
  --font:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --display:"Space Grotesk",Inter,ui-sans-serif,system-ui,sans-serif;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#100f0e; --bg-grad-a:rgba(16,185,129,.06); --bg-grad-b:rgba(249,115,22,.04);
    --surface:#1c1a18; --surface-2:#262320; --surface-3:#2e2b27;
    --border:#2b2825; --border-2:#3a3631;
    --ink:#f2f0ed; --ink-2:#c8c3bc; --ink-3:#8a847c; --ink-4:#4b463f;
    --accent:#10b981; --accent-2:#34d399; --accent-soft:#0b2b21; --accent-border:#14532d;
    --red-soft:#2b1414; --red-border:#7f1d1d; --red-ink:#fca5a5;
    --amber-soft:#2b2110; --amber-border:#92400e; --amber-ink:#fcd34d;
    --sky-ink:#7dd3fc; --sky-soft:#0c2231; --sky-border:#075985;
    --shadow-1:0 1px 2px rgba(0,0,0,.4),0 10px 24px -18px rgba(0,0,0,.6);
    --shadow-2:0 2px 6px rgba(0,0,0,.5),0 18px 36px -18px rgba(0,0,0,.7);
  }
}
html{background:var(--bg);color-scheme:light dark;overscroll-behavior-y:none}
body{
  overscroll-behavior-y:none;
  background:
    radial-gradient(1100px 520px at 50% -180px,var(--bg-grad-a),transparent 60%),
    radial-gradient(900px 460px at 108% 8%,var(--bg-grad-b),transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--ink);
  font-family:var(--font);
  font-size:15px; line-height:1.45;
  font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  -webkit-tap-highlight-color:transparent;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
button:active{filter:brightness(.97)}
input,textarea,select{font:inherit;color:var(--ink);background:var(--surface)}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px;border-radius:8px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* boot splash */
#root:empty{min-height:100vh;min-height:100dvh;display:grid;place-items:center}
#root:empty::before{content:"RAUS · TRACKER";font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:.22em;color:var(--ink-3);animation:pulse 1.15s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

/* ---------- layout ---------- */
.app{min-height:100vh;padding-bottom:96px}
.page{padding:16px 16px 0;animation:fadein .18s ease-out}
@keyframes fadein{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.section-title{font-size:.84rem;font-weight:700;color:var(--ink-2);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.stack>*+*{margin-top:8px}
.mt{margin-top:16px}

/* ---------- masthead ---------- */
.masthead{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--surface) 78%,transparent);
  -webkit-backdrop-filter:blur(16px) saturate(1.5);backdrop-filter:blur(16px) saturate(1.5);
  border-bottom:1px solid var(--border);padding:14px 16px 11px;box-shadow:0 8px 24px -20px rgba(28,25,23,.4)}
.head-row{display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--display);font-weight:700;font-size:1.4rem;letter-spacing:-.01em;line-height:1.15}
.brand-sub{font-size:.62rem;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.14em;margin-top:1px}
.head-right{display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 11px;box-shadow:var(--shadow-1);transition:transform .1s}
.pill:active{transform:scale(.95)}
.head-meta{text-align:right}
.head-date{font-size:.7rem;color:var(--ink-3)}
.save-ind{font-size:.7rem;font-weight:600;height:16px}
.save-ind .ok{color:var(--accent)} .save-ind .err{color:var(--red)} .save-ind .busy{color:var(--ink-3)}
.env-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px}
.banner{margin-top:9px;font-size:.74rem;font-weight:600;border:1px solid;border-radius:12px;padding:7px 11px}
.b-muted{background:var(--surface-2);border-color:var(--border);color:var(--ink-2)}
.b-red{background:var(--red-soft);border-color:var(--red-border);color:var(--red-ink)}
.b-amber{background:var(--amber-soft);border-color:var(--amber-border);color:var(--amber-ink)}
.b-green{background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent)}
.warn{margin-top:9px;font-size:.72rem;background:var(--amber-soft);border:1px solid var(--amber-border);color:var(--amber-ink);border-radius:10px;padding:5px 9px;display:flex;align-items:center;gap:5px}
.rest-banner{margin-top:9px;width:100%;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#2b2724,#1c1917);color:#fff;border-radius:12px;padding:9px 13px;transition:transform .1s;box-shadow:var(--shadow-1)}
.rest-banner:active{transform:scale(.97)}
.rest-banner .t{font-size:1.15rem;font-weight:700;font-family:var(--display)}
.rest-banner .s{display:flex;align-items:center;gap:6px;font-size:.84rem;font-weight:700}
.rest-banner .hint{font-size:.68rem;color:#c9c4be}

/* ---------- cards ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-1)}
.card-p{padding:14px}
.active-card{background:var(--surface);border:2px solid var(--ink);border-radius:var(--r-lg);box-shadow:var(--shadow-2);padding:14px;animation:fadein .15s ease-out}

/* ---------- volume bars ---------- */
.vol-row+.vol-row{margin-top:11px}
.vol-head{display:flex;align-items:center;justify-content:space-between;font-size:.76rem;margin-bottom:5px}
.vol-name{font-weight:600;color:var(--ink-2)}
.vol-nums{display:flex;align-items:center;gap:8px}
.vol-val{color:var(--ink-3);font-weight:500}
.vol-val.over{color:var(--amber);font-weight:700}
.bar{height:8px;border-radius:999px;background:var(--surface-3);overflow:hidden;box-shadow:inset 0 1px 2px rgba(28,25,23,.08)}
.bar>i{display:block;height:100%;border-radius:999px;transition:width .5s cubic-bezier(.22,1,.36,1);
  background-image:linear-gradient(180deg,rgba(255,255,255,.38),rgba(255,255,255,.06) 48%,rgba(0,0,0,.05));
  box-shadow:0 1px 2px rgba(28,25,23,.18);animation:grow .8s cubic-bezier(.22,1,.36,1) backwards}
@keyframes grow{from{width:0}}

/* ---------- buttons ---------- */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;font-weight:700;border-radius:var(--r-md);transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-block{width:100%}
.h14{height:56px;border-radius:var(--r-lg);font-size:1rem}
.h12{height:48px}
.h11{height:44px;font-size:.9rem}
.h10{height:40px;font-size:.82rem}
.btn-primary{background-image:linear-gradient(180deg,var(--accent-2),var(--accent));color:#fff;box-shadow:0 8px 18px -8px rgba(5,150,105,.55),inset 0 1px 0 rgba(255,255,255,.22)}
.btn-dark{background-image:linear-gradient(180deg,#2b2724,#1c1917);color:#fff;box-shadow:0 1px 2px rgba(28,25,23,.30),inset 0 1px 0 rgba(255,255,255,.07)}
.btn-ghost{background:var(--surface);border:1px solid var(--border-2);color:var(--ink)}
.btn-soft{background:var(--surface-2);color:var(--ink-2);font-weight:600}
.btn-dashed{background:transparent;border:1.5px dashed var(--border-2);color:var(--ink-2);font-weight:600}
.btn-danger{background:var(--red);color:#fff;font-size:.76rem;font-weight:700;border-radius:9px;padding:7px 12px}
.btn[disabled]{background:var(--surface-3);color:var(--ink-3);box-shadow:none;background-image:none}
.icon-btn{width:26px;height:26px;border-radius:8px;background:var(--surface-2);color:var(--ink-3);display:flex;align-items:center;justify-content:center;font-weight:700;transition:transform .1s}
.icon-btn:active{transform:scale(.9)}
.step{width:36px;height:36px;border-radius:11px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;transition:transform .1s}
.step:active{transform:scale(.9)}
.step-sm{width:28px;height:28px;border-radius:9px}
.mini{width:24px;height:24px;border-radius:7px;background:var(--surface-2);display:flex;align-items:center;justify-content:center}
.link{font-size:.72rem;font-weight:600;color:var(--ink-3);text-decoration:underline}
.seg{height:48px;border-radius:var(--r-md);font-size:.86rem;font-weight:700;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .1s}
.seg:active{transform:scale(.96)}
.seg.on{background-image:linear-gradient(180deg,#2b2724,#1c1917);color:#fff;border-color:#1c1917}
@media (prefers-color-scheme:dark){
  .seg.on,.btn-dark{background-image:linear-gradient(180deg,#3b3733,#26221f);border-color:#3b3733}
  .rest-banner{background:linear-gradient(180deg,#3b3733,#26221f)}
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.label-xs{font-size:.66rem;font-weight:700;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase}
.chip{width:32px;height:32px;border-radius:9px;font-size:.86rem;font-weight:700;background:var(--surface-2);color:var(--ink-2);display:flex;align-items:center;justify-content:center}
.chip.on{background:var(--ink);color:var(--bg)}
.chip-lp{height:32px;padding:0 9px;border-radius:9px;font-size:.72rem;font-weight:700;background:var(--surface-2);color:var(--ink-2)}
.chip-lp.on{background:var(--lp);color:#fff}

/* ---------- exercise rows / session ---------- */
.ex-card{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:11px 14px;box-shadow:var(--shadow-1);transition:transform .1s;display:block}
.ex-card:active{transform:scale(.97)}
.ex-card.done{border-color:var(--accent-border);opacity:.72}
.ex-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ex-name{font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:8px;min-width:0}
.ex-name .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:999px;flex:none}
.dot-lg{width:10px;height:10px}
.rx{font-size:.7rem;font-weight:600;color:var(--ink-3);flex:none}
.setline{font-size:.74rem;color:var(--ink-2);margin-top:3px}
.lastperf{font-size:.72rem;color:var(--sky-ink);margin-top:3px}
.never{font-size:.72rem;color:var(--ink-4);margin-top:3px}
.ex-side{font-size:.72rem;color:var(--ink-3);flex:none;text-align:right}
.ex-side b{color:var(--ink-2);font-weight:600}
.sess-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sess-title{font-weight:700;font-size:.95rem}
.sess-sub{font-size:.74rem;color:var(--ink-2)}
.sess-sub b{color:var(--ink);font-weight:700}

/* ---------- log form ---------- */
.lf-head{font-weight:700;display:flex;align-items:center;gap:8px;font-size:.95rem}
.lf-meta{font-size:.72rem;color:var(--ink-3);font-weight:500;margin-top:1px}
.lf-note{font-size:.72rem;color:var(--ink-3);margin-top:3px}
.set-row{margin-top:7px;display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:8px 11px}
.set-row .main{font-size:.85rem;font-weight:600}
.set-row .plates{display:block;font-size:.68rem;color:var(--ink-3)}
.lf-divider{margin-top:11px;border-top:1px solid var(--border);padding-top:11px}
.plate-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.plate-cell{display:flex;align-items:center;justify-content:space-between;border-radius:12px;padding:6px 9px;border:1px solid var(--border)}
.plate-cell.hot5{border-color:var(--border-2);background:var(--surface-2)}
.plate-cell.hot{border-color:var(--amber-border);background:var(--amber-soft)}
.plate-den{font-size:.74rem;font-weight:700;color:var(--ink-2)}
.plate-den.acc{color:var(--amber-ink)}
.plate-den span{font-weight:400;color:var(--ink-3)}
.plate-count{width:20px;text-align:center;font-weight:700;font-size:.88rem}
.kg-row{display:flex;align-items:center;justify-content:center;gap:8px}
.kg-input{width:84px;height:40px;text-align:center;font-weight:700;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
.kg-nudge{height:40px;padding:0 10px;border-radius:12px;background:var(--surface-2);font-size:.74rem;font-weight:700}
.kg-line{margin-top:7px;display:flex;align-items:baseline;justify-content:space-between;padding:0 2px}
.kg-big{font-size:1.25rem;font-weight:700;font-family:var(--display)}
.kg-unit{font-size:.72rem;font-weight:400;color:var(--ink-3)}
.kg-plates{font-size:.72rem;color:var(--ink-2)}
.rep-row{margin-top:9px;display:flex;align-items:center;gap:5px}
.rep-label{font-size:.72rem;color:var(--ink-3);margin-right:3px}
.rep-label.right{margin-left:auto}
.rep-val{width:36px;text-align:center;font-weight:700}

/* ---------- picker ---------- */
.group-head{width:100%;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.group-name{font-weight:600;font-size:.88rem;display:flex;align-items:center;gap:8px}
.group-side{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700}
.left-count{color:var(--ink-2)}
.left-done{color:var(--accent)}
.group-body{border-top:1px solid var(--border);padding:0 10px 10px}
.opt{width:100%;margin-top:7px;text-align:left;border-radius:12px;border:1px solid var(--border);background:var(--surface);padding:9px 12px;transition:transform .08s}
.opt:active{transform:scale(.98)}
.opt.on{border-color:var(--ink);background:var(--surface-2)}

/* ---------- sheet / overlay ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:flex;align-items:flex-end;animation:fadein .12s}
.sheet{background:var(--surface);width:100%;border-radius:22px 22px 0 0;padding:16px 16px 24px;box-shadow:0 -20px 60px rgba(0,0,0,.3);animation:slideup .2s cubic-bezier(.22,1,.36,1)}
@keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.field{width:100%;border:1px solid var(--border-2);border-radius:12px;padding:10px 12px;font-size:.88rem;background:var(--surface)}
select.field{padding:9px 8px}

/* ---------- nav ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;
  background:color-mix(in srgb,var(--surface) 84%,transparent);
  -webkit-backdrop-filter:blur(16px) saturate(1.5);backdrop-filter:blur(16px) saturate(1.5);
  border-top:1px solid var(--border);box-shadow:0 -10px 30px -22px rgba(28,25,23,.35);
  padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.7rem;font-weight:600;color:var(--ink-4);transition:color .15s}
.nav-btn.on{color:var(--ink)}
.nav-dot{width:4px;height:4px;border-radius:999px;background:transparent}
.nav-btn.on .nav-dot{background:var(--accent)}

/* ---------- check-in ---------- */
.ci-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
.ci-row+.ci-row{border-top:1px solid var(--border)}
.ci-label{font-size:.86rem;font-weight:500;display:flex;align-items:center;gap:6px}
.num-input{width:92px;height:40px;text-align:center;font-weight:700;border:1px solid var(--border-2);border-radius:12px;background:var(--surface)}
.ci-val{width:30px;text-align:center;font-weight:700;font-size:1.05rem}
textarea.field{resize:vertical}
.report-hint{font-size:.72rem;color:var(--ink-3);margin-top:6px}
.import-msg{margin-top:6px;font-size:.74rem;font-weight:600;color:var(--accent)}

/* ---------- history ---------- */
.hist-head{width:100%;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;text-align:left}
.hist-title{font-weight:600;font-size:.88rem}
.hist-sub{font-size:.72rem;color:var(--ink-3)}
.hist-body{padding:0 15px 12px;border-top:1px solid var(--border)}
.hist-ex{margin-top:9px}
.hist-ex .n{font-size:.74rem;font-weight:600;color:var(--ink-2)}
.hist-ex .s{font-size:.83rem;color:var(--ink-2)}
.empty{padding:44px 16px;text-align:center;color:var(--ink-4);font-size:.85rem}

/* ---------- trends ---------- */
.spark{width:100%;height:150px}
.trend-row{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding:7px 0;font-size:.85rem}
.trend-date{color:var(--ink-3);font-size:.72rem;width:46px}
.trend-up{color:var(--accent);font-weight:700}
.trend-flat{color:var(--ink-4)}

/* program panel */
.prog-day{background:var(--surface-2);border-radius:13px;padding:9px;margin-top:7px}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-name{font-size:.86rem;font-weight:600}
.prog-sub{font-size:.7rem;color:var(--ink-3)}
.prog-list{margin-top:7px;border-top:1px solid var(--border);padding-top:6px}
.prog-ex{display:flex;align-items:center;justify-content:space-between;font-size:.76rem;padding:2px 0}
.prog-ex .n{color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.prog-ex .r{color:var(--ink-3);font-weight:600;flex:none}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-3);gap:8px;font-size:.85rem;font-weight:500}
.spin{animation:pulse 1.15s ease-in-out infinite}

</style>
</head>
